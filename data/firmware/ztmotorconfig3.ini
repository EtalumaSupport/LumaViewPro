;; =============================================================================
;; ztmotorconfig3.ini — TMC5072 Register Configuration for Z/T Axes
;; =============================================================================
;;
;; Chip:           TMC5072 (ZT)
;; M1 = T axis (turret/objective changer)
;; M2 = Z axis (focus)
;; M1 registers:   0x20-0x3A, shared: 0x00-0x05, 0x60-0x7E
;; M2 registers:   0x40-0x5A, shared: 0x00-0x05, 0x60-0x7E
;;
;; Used by:        EL-1210 and EL-1215 Z axes with Nanotec Z motor
;; Selected when:  motorconfig.json "IniFiles.ZT" = "ztmotorconfig3.ini"
;;
;; NOTE: This file is for units that have the Nanotec LGA201S06 Z motor
;;       instead of the Dings' Motion 8K2105AF4. Check build sheets to
;;       determine which motor is installed. The lead screw pitch is the
;;       same (0.3mm) so usteps/mm is unchanged, but the rated current
;;       is significantly lower (0.37A vs 0.5A for the Dings motor).
;;
;; =============================================================================
;; T AXIS — TURRET (M1) — EL-1205 — Nanotec SC2818S0604-B
;; =============================================================================
;; (Same turret motor as ztmotorconfig.ini — see that file for full specs)
;;
;; Manufacturer:   Nanotec
;; Part Number:    SC2818S0604-B
;; Type:           NEMA 11 bipolar stepper motor (rotary)
;; Rated Current:  0.67 A per phase
;; Resistance:     6.2 Ω per phase
;; Inductance:     5.76 mH per phase
;;
;; NOTE: IHOLD > IRUN is INTENTIONAL — turret has no mechanical detent.
;;
;; Parameter       Value           Units / Notes
;; ---------       -----           -------------
;; VMAX            128,000         usteps/sec
;; AMAX            5,000           usteps/sec²
;; DMAX            5,000           usteps/sec²
;; VSTOP           10              usteps/sec
;; IRUN            5               CS value → ~136 mA RMS (20% of rated)
;; IHOLD           7               CS value → ~181 mA RMS (HIGHER — intentional)
;; IHOLDDELAY      3               transition time
;; CHOPCONF        0x00010005      TOFF=5, HSTRT=0, HEND=0, TBL=2, 256usteps
;; SW_MODE         0x01            Left limit only, not inverted (optical sensor)
;; PWMCONF         0x00000000      StealthChop DISABLED
;;
;; =============================================================================
;; Z AXIS — FOCUS (M2) — Nanotec LGA201S06-A-UEAI-019
;; =============================================================================
;; Manufacturer:   Nanotec
;; Part Number:    LGA201S06-A-UEAI-019
;; Type:           NEMA 8 bipolar linear actuator
;; Step Angle:     1.8°
;; Rated Current:  0.37 A per phase (base motor current 0.6A)
;; Resistance:     6.4 Ω ±10% per phase
;; Inductance:     2.6 mH ±20% per phase
;; Lead Screw:     Φ3.5 mm diameter, 0.3048 mm lead (~0.3 mm)
;; Travel/Step:    0.001524 mm/step
;; Stroke:         19.05 mm
;; Rated Force:    3 N / Max Force: 63 N
;; Max Speed:      5.1 mm/sec at 24V
;; Resolution:     200 steps × 256 usteps = 51200 usteps/rev
;;                 51200 / 0.3048 mm = 167,979 usteps/mm
;; Limit Sensors:  Optical (0-step variation, perfect repeatability)
;; Weight:         0.066 kg
;;
;; CURRENT NOTE: Starting with IRUN=22 (519mA, 140% of 0.37A rated) to match
;;   proven settings from ztmotorconfig.ini. Z moves are short duration so
;;   thermal risk is low. TUNE DOWN after hardware validation — target CS=14
;;   (338mA, 91% of rated) or CS=15 (361mA, 98% of rated).
;;
;; CHOPCONF NOTE: Higher coil resistance (6.4Ω vs 5.1Ω for Dings motor) and
;;   inductance (2.6mH vs 1.5mH) may benefit from different chopper tuning.
;;   Starting with same CHOPCONF as ztmotorconfig.ini; tune after testing.
;;
;; Parameter       Value           Units / Notes
;; ---------       -----           -------------
;; VMAX            400,000         usteps/sec
;; AMAX            25,000          usteps/sec²
;; DMAX            25,000          usteps/sec²
;; VSTOP           100             usteps/sec
;; VSTART          0               usteps/sec
;; A1              0               usteps/sec² (6-pt ramp, unused)
;; V1              0               usteps/sec (6-pt ramp, unused)
;; D1              1               usteps/sec² (must be nonzero)
;; TZEROWAIT       0               clock cycles
;;
;; IRUN            22              CS value → ~519 mA RMS ⚠️ 140% OF RATED — tune down
;; IHOLD           4               CS value → ~113 mA RMS
;; IHOLDDELAY      1               transition time IRUN→IHOLD
;;
;; CHOPCONF        0x000003F2      TOFF=2 ⚠️ (below min 3), HSTRT=7, HEND=7, TBL=0, 256usteps
;; SW_MODE         0x03            Both limits enabled, not inverted (optical sensors)
;; PWMCONF         0x00000000      StealthChop DISABLED
;;
;; TODO: Tune IRUN down to CS=14-15 after hardware validation
;; TODO: Fix CHOPCONF TOFF to ≥3
;; TODO: Consider different CHOPCONF tuning for higher R/L motor
;;
;; =============================================================================
;; CURRENT CALCULATION
;; =============================================================================
;; Formula: I_RMS = (CS+1)/32 × V_FS/R_SENSE × 0.60
;; With V_FS=0.325V, R_SENSE=0.27Ω: I_RMS = (CS+1)/32 × 1.204A × 0.60
;;
;; CS=3  →  90 mA    CS=12 → 293 mA    CS=22 → 519 mA
;; CS=5  → 136 mA    CS=14 → 338 mA    CS=25 → 587 mA
;; CS=7  → 181 mA    CS=15 → 361 mA
;;
;; =============================================================================
;; CHANGE LOG
