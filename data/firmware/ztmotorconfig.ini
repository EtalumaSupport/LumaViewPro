0x23 	= 	0x00000000 		;; writing VSTART_M1 @ address 7=0x23 with 0x00000000=0=0.0
0x24 	= 	0x00000000 		;; writing A1_M1 @ address 8=0x24 with 0x00000000=0=0.0 Not Used, for 6pt Ramp
0x25 	= 	0x00000000 		;; writing V1_M1 @ address 9=0x25 with 0x00000000=0=0.0 Not Used, for 6pt Ramp
0x26 	= 	0x00001388 		;; writing AMAX_M1 @ address 10=0x26 with 0x00001388=5000=0.0
0x27 	= 	0x0001F400 		;; writing VMAX_M1 @ address 11=0x27 with 0x00001F400=12800 
0x28 	= 	0x00001388 		;; writing DMAX_M1 @ address 12=0x28 with 0x00001388=5000=0.0
