;;====================================================================================================;;
;;WARNING: Changing any parameter in this file is done at your own risk, and is strongly advised against
;; unless under direct instruction from Etaluma technical support.                                      
;;
;; ACTUAL SETTINGS FOR TMC5072 Z & T Stepper motor driver for Etaluma Lumascopes.                       
;; Updated: 2026/03/13 ESW) T IRUN 7->5, Z AMAX/DMAX 20K->25K, Z VSTOP 1000->100
;;
;; FORMAT: 0xADDRESS = 0xVALUE ;; COMMENT                                                         
;; M1 = T axis = Turret  
;; M2 = Z axis = Focus                                                            
;;vvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvvv;;
;; Etaluma LVPro Key settings for T axis(M1)
;; VMAX=128000
;; AMAX=5000
;; DMAX=5000
;; IRUN=5 (~136mA RMS per coil, 226mA peak. Optimized 2026/03/13 -- quieter, still homes in 3.1s)
;; IHOLD=7 (~181mA RMS per coil, 301mA peak. Holds position at full current -- below noise threshold)
;; IHOLDDELAY=3
;; CHOPCONF=0x00010005: TOFF=5, HSTRT=0, HEND=0, TBL=2, 256 microsteps
;; SW_MODE=0x01 (left limit only, not inverted)
;; D1 parameters MUST NOT BE ZERO
;;
;; Etaluma LVPro Key settings for Z axis(M2)
;; VMAX=400000
;; AMAX=25000 (optimized 2026/03/13 -- tested 10K-65K, 25K best noise/speed)
;; DMAX=25000
;; IRUN=22 (~519mA RMS per coil, 865mA peak)
;; IHOLD=4 (~113mA RMS per coil, 188mA peak)
;; IHOLDDELAY=1
;; VSTOP=100 (reduced from 1000 -- adds ~15ms settle, much more accurate stop position)
;; CHOPCONF=0x000003F2: TOFF=2, HSTRT=7, HEND=7, TBL=0, 256 microsteps
;;   NOTE: TOFF=2 is below datasheet recommended minimum of 3
;; SW_MODE=0x03 (left+right limits, not inverted)
;;
;;
0x00 	= 	0x00000000 		;; writing GCONF @ address 0=0x00 with 0x00000000=0=0.0
0x03 	= 	0x00000000 		;; writing SLAVECONF @ address 1=0x03 with 0x00000000=0=0.0
0x05 	= 	0x00000000 		;; writing X_COMPARE @ address 2=0x05 with 0x00000000=0=0.0
0x10 	= 	0x00000000 		;; writing PWMCONF_M1 @ address 3=0x10 with 0x000504C8=328904=0.0
0x18 	= 	0x00000000 		;; writing PWMCONF_M2 @ address 4=0x18 with 0x000504C8=328904=0.0
0x20 	= 	0x00000000 		;; writing RAMPMODE_M1 @ address 5=0x20 with 0x00000000=0=0.0
